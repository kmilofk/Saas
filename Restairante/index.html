<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Anthony Chef | Sistema de Gestión</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts - Plus Jakarta Sans (Premium SaaS Font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Login Styles -->
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <!-- Background Decorative Elements -->
    <div class="bg-decoration">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Main Login Wrapper - Two Column Layout -->
    <div class="login-wrapper">
        <!-- Left Side - Login Form -->
        <div class="login-left">
            <div class="login-card">
                <!-- Card Glow Effect -->
                <div class="card-glow"></div>

                <!-- Welcome Text -->
                <div class="welcome-section">
                    <h2 class="welcome-title">¡Bienvenido de nuevo!</h2>
                    <p class="welcome-text">Ingresa a tu cuenta para continuar</p>
                </div>

                <!-- Tab Switcher -->
                <div class="login-tabs">
                    <button class="tab-btn active" data-tab="owner">
                        <i class="fas fa-crown"></i>
                        <span>Dueño</span>
                    </button>
                    <button class="tab-btn" data-tab="admin">
                        <i class="fas fa-user-tie"></i>
                        <span>Administrador</span>
                    </button>
                </div>

                <!-- Owner Login Form -->
                <form id="owner-form" class="login-form active">
                    <div class="form-group">
                        <label for="owner-phone">
                            <i class="fas fa-user"></i>
                            <span>Usuario</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="owner-phone" name="phone" placeholder="Ingresa tu usuario"
                                autocomplete="username">
                            <span class="input-icon">
                                <i class="fas fa-user"></i>
                            </span>
                        </div>
                        <span class="error-message" id="owner-phone-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="owner-password">
                            <i class="fas fa-lock"></i>
                            <span>Contraseña</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="owner-password" name="password" placeholder="••••••••"
                                autocomplete="current-password">
                            <button type="button" class="toggle-password" data-target="owner-password" tabindex="-1">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="owner-password-error"></span>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="btn-text">Ingresar como Dueño</span>
                        <span class="btn-icon">
                            <i class="fas fa-arrow-right"></i>
                        </span>
                    </button>
                </form>

                <!-- Admin Login Form -->
                <form id="admin-form" class="login-form">
                    <div class="form-group">
                        <label for="admin-username">
                            <i class="fas fa-user"></i>
                            <span>Usuario o Correo</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="admin-username" name="username" placeholder="admin1"
                                autocomplete="username">
                            <span class="input-icon">
                                <i class="fas fa-user"></i>
                            </span>
                        </div>
                        <span class="error-message" id="admin-username-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="admin-password">
                            <i class="fas fa-lock"></i>
                            <span>Contraseña</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="admin-password" name="password" placeholder="••••••••"
                                autocomplete="current-password">
                            <button type="button" class="toggle-password" data-target="admin-password" tabindex="-1">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="admin-password-error"></span>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="btn-text">Ingresar como Administrador</span>
                        <span class="btn-icon">
                            <i class="fas fa-arrow-right"></i>
                        </span>
                    </button>
                </form>

                <!-- Login Status Message -->
                <div class="login-message" id="login-message">
                    <span class="message-icon">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                    <span class="message-text">Autenticando...</span>
                </div>

                <!-- Security Badge (Moved inside card) -->
                <div class="security-badge">
                    <i class="fas fa-shield-halved"></i>
                    <span>Acceso seguro y encriptado</span>
                </div>
            </div>

            <!-- Footer -->
            <footer class="login-footer">
                <p>&copy; 2026 Anthony Chef. Todos los derechos reservados.</p>
            </footer>
        </div>

        <!-- Right Side - Logo Section -->
        <div class="login-right">
            <div class="logo-section">
                <div class="logo-glow-bg"></div>
                <div class="logo-ring logo-ring-1"></div>
                <div class="logo-ring logo-ring-2"></div>
                <div class="logo-ring logo-ring-3"></div>
                <img src="assets/logo.png" alt="Anthony Chef" class="main-logo">
                <h1 class="logo-title">Anthony Chef</h1>
                <p class="logo-subtitle">Plataforma de Gestión Multi-Sucursal</p>
                <div class="logo-decoration"></div>
            </div>
        </div>
    </div>

    <!-- Login Script -->
    <script src="assets/js/login.js"></script>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-logo-wrapper">
                <div class="loading-ring loading-ring-1"></div>
                <div class="loading-ring loading-ring-2"></div>
                <div class="loading-ring loading-ring-3"></div>
                <img src="assets/logo.png" alt="Anthony Chef" class="loading-logo">
                <div class="loading-glow"></div>
            </div>
            <h2 class="loading-title">Anthony Chef</h2>
            <p class="loading-text">Autenticando...</p>
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
        </div>
    </div>
</body>

</html>
